name: Deploy Portal to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
# Trigger on any push to main or any PR against main

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event_name != 'pull_request_target')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install and Build
        run: |
          npm install
          npm run build
          cp staticwebapp.config.json dist/
        env:
          VITE_API_BASE_URL: https://prenatalvision-server-frbed8caethpahg2.southeastasia-01.azurewebsites.net/api/v1

      - name: Deploy to Azure
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "dist" 
          skip_app_build: true 
